<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11B2 - 2026</title>
    <link rel="stylesheet" href="style.css">
    <!-- GG ICON -->
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back_ios,arrow_forward_ios,close,list_alt,pause,play_arrow,repeat,skip_next,skip_previous,volume_down,volume_mute,volume_off,volume_up"/>
    <!-- GG FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
</head>
<body>
    <div id="bubblesBackground">
    </div>
    <main>
        <div class="top">
            <h1 class="heading">Từ 11B2</h1>
            <p class="decs" style="display: none; text-align:justify;">Ngày 8 tháng 3 lại đến rồi. Hãy cùng lắng nghe xem những lời chúc từ các bạn nam 11B2 dành cho mọi người nhé!</p>
            <button id="watchVidButton" style="display: none;">
                <div class="buttonWrap">
                    <div class="buttonBGColor"></div>
                    <div class="buttonBorderColor"></div>
                    <div class="buttonLightEffect"></div>
                </div>
                <div class="buttonGlow"></div>
                <span style="position: relative; z-index: 2;">Xem video</span>
            </button>
        </div>
        <div class="centerVideoList">
            <div class="videoList" style="display: none;">
                <div class="videoWrap">
                    <ul>
                        <li><video id="video" autoplay controls style="display: block; opacity: 0;"></video></li>
                    </ul>
                    <div class="nav">
                        <span id="lastVideo" style="opacity: 0;" class="ggIcon material-symbols-rounded">arrow_back_ios</span>
                        <p style="letter-spacing: 2px; font-size: 17px;"><span id="videoIndex"></span>/<span id="maxVideoIndex"></span></p>
                        <span id="nextVideo" class="ggIcon material-symbols-rounded">arrow_forward_ios</span>
                    </div>
                </div>
                <span id="openVideoList" class="ggIcon material-symbols-rounded">list_alt</span>
                <ul id="videoList" style="display: none;">
                </ul>
            </div>
        </div>
    </main>
    <div class="topLayer">
        <div id="musicWrap" class="musicWrap">
            <audio src="music/1.mp3" autoplay id="musicAudio"></audio>
            <div class="musicInfo">
                <div class="musicName" id="musicName"></div>
                <div id="progressBar" class="progressBar">
                    <div id="progress" class="progress"></div>
                </div>
                <div class="navMusic">
                    <span id="previousTrack" class="ggIcon material-symbols-rounded">skip_previous</span>
                    <span id="pause" class="ggIcon material-symbols-rounded">pause</span>
                    <span id="nextTrack" class="ggIcon material-symbols-rounded">skip_next</span>
                    <span id="loop" class="ggIcon material-symbols-rounded">repeat</span>
                </div>
            </div>
        </div>
        <span id="closeTopLayer" class="ggIcon material-symbols-rounded">close</span>
        <div id="volumeWrap" class="volumeWrap">
            <span id="volume" class="ggIcon material-symbols-rounded">volume_down</span>
            <div id="volumeBar" class="progressBar">
                <div id="volumeValue" class="progress"></div>
            </div>
        </div>
    </div>
</body>
<script src="setup.js"></script>
<script src="video.js" type="module"></script>
<script src="animation.js" type="module"></script>
<script src="script.js" type="module"></script>
<script src="music.js"></script>
</html>
